<script src="/scripts/soundcloud-loop.js"></script>
<script>
    document.querySelectorAll('.button-card').forEach((card) => {
        const image = card.querySelector('.button-photo');
        if (!image) {
            return;
        }

        const originalSrc = image.getAttribute('src');
        const hoverSrc = image.dataset.hoverSrc;

        if (!originalSrc || !hoverSrc) {
            return;
        }

        const preload = new Image();
        preload.src = hoverSrc;

        const showHover = () => {
            image.src = hoverSrc;
        };

        const showOriginal = () => {
            image.src = originalSrc;
        };

        card.addEventListener('mouseenter', showHover);
        card.addEventListener('mouseleave', showOriginal);
        card.addEventListener('focus', showHover);
        card.addEventListener('blur', showOriginal);
    });
</script>
<p class="bottom-text">Made with 💖 by @zook, June 2026</p>
</body>
